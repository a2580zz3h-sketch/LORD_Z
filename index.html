<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغل وتحميل الفيديوهات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- اللودر Banter-Loader في الزاوية العلوية -->
  <div class="header-loader-container">
    <div class="banter-loader">
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
      <div class="banter-loader__box"></div>
    </div>
  </div>

  <main class="container">
    <h1 class="main-title">🎬 مشغل وتحميل الفيديوهات</h1>

    <!-- تحديد منصة الفيديو -->
    <div class="platform-selector">
      <button class="platform-btn active" data-platform="auto">تلقائي ⚡</button>
      <button class="platform-btn" data-platform="youtube">يوتيوب 🔴</button>
      <button class="platform-btn" data-platform="tiktok">تيك توك 🎵</button>
      <button class="platform-btn" data-platform="facebook">فيسبوك 📘</button>
    </div>

    <!-- شريط البحث والإدخال -->
    <div class="search-box">
      <input type="text" id="videoUrl" class="search-input" placeholder="ضع رابط الفيديو هنا..." autocomplete="off">
      <button id="loadBtn" class="btn">عرض الفيديو</button>
    </div>

    <!-- رسالة الخطأ -->
    <p id="errorMsg" class="error-msg hidden"></p>

    <!-- منطقة الشاشة وزر التحميل الموحد -->
    <div id="videoSection" class="video-section hidden">
      <div class="player-container">
        <iframe id="youtubePlayer" class="player hidden" allowfullscreen allow="autoplay"></iframe>
        <video id="videoPlayer" class="player hidden" controls preload="metadata"></video>
      </div>

      <!-- زر تحميل فريد وواحد فقط -->
      <div class="download-container">
        <button id="downloadBtn" class="btn download-style">⬇️ تحميل الفيديو الآن</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
