<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lord Chat</title>
    <link rel="icon" type="image/jpeg" href="https://h.uguu.se/UhGQiLUR.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-container">
            <img src="https://h.uguu.se/UhGQiLUR.jpg" alt="Lord Chat Logo" class="login-logo" id="login-logo-preview">
            <h1 class="login-title">LORD CHAT</h1>
            <p class="login-subtitle">انضم إلى المحادثة الحقيقية</p>

            <div class="input-group">
                <input type="text" id="username-input" placeholder="Username (English only)..." maxlength="20" autocomplete="off">
                <div class="input-error" id="username-error"></div>
            </div>

            <div class="avatar-selector" id="avatar-selector">
                <img src="https://h.uguu.se/UhGQiLUR.jpg" class="avatar-option selected" data-avatar="https://h.uguu.se/UhGQiLUR.jpg" alt="Logo">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-option" data-avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar 1">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-option" data-avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" alt="Avatar 2">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Zack" class="avatar-option" data-avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Zack" alt="Avatar 3">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bella" class="avatar-option" data-avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Bella" alt="Avatar 4">
            </div>

            <button class="btn-primary" id="login-btn">دخول الشات</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="https://h.uguu.se/UhGQiLUR.jpg" alt="Logo" class="sidebar-logo">
                <div class="sidebar-brand">LORD<span>CHAT</span></div>
            </div>

            <div class="online-count">
                <span class="dot"></span>
                <span id="online-count-text">1 متصل</span>
            </div>

            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="user-search" placeholder="ابحث عن مستخدم..." autocomplete="off">
            </div>

            <div class="users-list" id="users-list"></div>

            <div class="sidebar-footer">
                <img src="" alt="Me" class="my-avatar" id="my-avatar">
                <div class="my-info">
                    <div class="my-name" id="my-name"></div>
                    <div class="my-username" id="my-username"></div>
                </div>
                <button class="status-menu-btn" id="invite-btn-sidebar" title="رابط الدعوة">🔗</button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <div class="chat-header" id="chat-header">
                <div class="chat-header-left">
                    <img src="https://h.uguu.se/UhGQiLUR.jpg" alt="" class="chat-header-avatar" id="chat-header-avatar">
                    <div class="chat-header-info">
                        <h3 id="chat-header-name">الشات العام</h3>
                        <p id="chat-header-status"><span class="status-dot online" style="position:static;display:inline-block;width:8px;height:8px;"></span> <span id="online-in-chat">1 متصل</span></p>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="icon-btn" id="invite-btn-header" title="نسخ رابط الدعوة">🔗</button>
                    <button class="icon-btn" id="clear-chat-btn" title="مسح المحادثة">🗑️</button>
                </div>
            </div>

            <div class="messages-container" id="messages-container"></div>

            <div class="chat-input-area" id="chat-input-area">
                <textarea class="chat-input" id="message-input" placeholder="اكتب رسالتك في الشات العام..." rows="1"></textarea>
                <button class="send-btn" id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span id="toast-text"></span>
    </div>

    <!-- Invite Modal -->
    <div class="modal-overlay" id="invite-modal">
        <div class="modal">
            <h3>🔗 رابط الدعوة</h3>
            <p>شارك هذا الرابط مع أي شخص للانضمام إلى الشات</p>
            <div class="invite-link-box">
                <input type="text" id="invite-link-input" readonly>
                <button id="copy-link-btn">نسخ</button>
            </div>
            <button class="modal-close" id="close-modal">إغلاق</button>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="context-menu">
        <div class="context-menu-item" id="ctx-copy">📋 نسخ الرسالة</div>
        <div class="context-menu-item" id="ctx-delete">🗑️ حذف الرسالة</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" id="ctx-invite">🔗 رابط الدعوة</div>
    </div>

    <button class="mobile-toggle" id="mobile-toggle">☰</button>

    <script src="script.js"></script>
</body>
</html>
